<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的待办</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Rubik:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0f0d0c;
      --bg-card: #1c1817;
      --bg-task: #25211e;
      --bg-hover: #2f2a26;
      --gold: #d4a373;
      --gold-light: #e8c49a;
      --gold-dark: #b88555;
      --gold-glow: rgba(212, 163, 115, 0.12);
      --text-primary: #f0ece4;
      --text-secondary: #a09892;
      --text-muted: #6b6560;
      --border: #2e2a27;
      --danger: #e07a5f;
      --danger-bg: rgba(224, 122, 95, 0.1);
      --shadow-card: 0 8px 32px rgba(0,0,0,0.4);
      --shadow-task: 0 2px 8px rgba(0,0,0,0.2);
      --radius: 12px;
      --radius-sm: 8px;
      --font-heading: 'Fraunces', Georgia, serif;
      --font-body: 'Rubik', -apple-system, sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    ::selection {
      background: rgba(212, 163, 115, 0.25);
      color: var(--text-primary);
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #3a3633;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
      color: var(--text-primary);
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    .container {
      width: 100%;
      max-width: 520px;
      position: relative;
      z-index: 1;
    }

    .card {
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card), 0 0 80px rgba(212, 163, 115, 0.02);
      padding: 36px 28px;
    }

    h1 {
      font-family: var(--font-heading);
      font-size: 28px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 28px;
      letter-spacing: -0.3px;
      position: relative;
    }

    h1::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 0;
      width: 44px;
      height: 2px;
      background: var(--gold);
      border-radius: 2px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      min-width: 0;
      padding: 11px 16px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-primary);
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-row input::placeholder {
      color: var(--text-muted);
    }

    .input-row input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-glow);
    }

    .custom-select {
      position: relative;
    }

    .select-trigger {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 11px 10px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-primary);
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
      white-space: nowrap;
      width: 100%;
    }

    .select-trigger:hover,
    .custom-select.open .select-trigger {
      border-color: var(--gold);
    }

    .custom-select.open .select-trigger {
      box-shadow: 0 0 0 3px var(--gold-glow);
    }

    .select-value {
      flex: 1;
      text-align: center;
    }

    .select-arrow {
      font-size: 9px;
      color: var(--text-muted);
      transition: transform 0.2s;
    }

    .custom-select.open .select-arrow {
      transform: rotate(180deg);
    }

    .select-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      z-index: 100;
      overflow: hidden;
    }

    .select-option {
      display: block;
      width: 100%;
      padding: 9px 12px;
      border: none;
      background: none;
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      text-align: center;
      transition: background 0.1s, color 0.1s;
    }

    .select-option:hover {
      background: var(--bg-task);
      color: var(--text-primary);
    }

    .select-option.selected {
      color: var(--gold);
      font-weight: 500;
      background: rgba(212, 163, 115, 0.06);
    }

    .input-row .add-btn {
      padding: 11px 20px;
      background: var(--gold);
      color: var(--bg-primary);
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      white-space: nowrap;
    }

    .input-row .add-btn:hover {
      background: var(--gold-light);
      box-shadow: 0 2px 12px rgba(212, 163, 115, 0.25);
    }

    .stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .stats .counts span {
      font-weight: 500;
      color: var(--text-secondary);
    }

    .clear-all-btn {
      background: none;
      border: 1px solid rgba(224, 122, 95, 0.25);
      color: var(--danger);
      font-family: var(--font-body);
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .clear-all-btn:hover {
      background: var(--danger-bg);
      border-color: rgba(224, 122, 95, 0.4);
    }

    .clear-all-btn.hidden {
      display: none;
    }

    .filters {
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .filter-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter-row + .filter-row {
      margin-top: 8px;
    }

    .filter-btn {
      padding: 5px 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover {
      border-color: var(--gold);
      color: var(--text-secondary);
    }

    .filter-btn.active {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--bg-primary);
      font-weight: 500;
    }

    .todo-list {
      list-style: none;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      margin-bottom: 6px;
      background: var(--bg-task);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-task);
      transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
      animation: fadeSlideUp 0.3s ease-out both;
    }

    .todo-item:last-child {
      margin-bottom: 0;
    }

    .todo-item:hover {
      background: var(--bg-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    }

    .todo-item.removing {
      animation: slideOutRight 0.25s ease-in forwards;
      pointer-events: none;
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideOutRight {
      from { opacity: 1; transform: translateX(0); }
      to { opacity: 0; transform: translateX(24px); }
    }

    .todo-item input[type="checkbox"] {
      appearance: none;
      width: 20px;
      height: 20px;
      border: 2px solid var(--text-muted);
      border-radius: 4px;
      position: relative;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .todo-item input[type="checkbox"]:hover {
      border-color: var(--gold);
    }

    .todo-item input[type="checkbox"]:checked {
      background: var(--gold);
      border-color: var(--gold);
    }

    .todo-item input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      inset: 3px;
      background: var(--bg-primary);
      clip-path: polygon(14% 44%, 0 65%, 35% 100%, 100% 24%, 78% 8%, 35% 60%);
    }

    .tag-priority, .tag-category {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 3px;
      color: var(--bg-primary);
      flex-shrink: 0;
      line-height: 1.5;
      letter-spacing: 0.3px;
    }

    .tag-priority.high { background: #d9777a; }
    .tag-priority.medium { background: var(--gold); }
    .tag-priority.low { background: #86b39e; }

    .tag-category.general { background: #7d7a75; }
    .tag-category.work { background: #a98ec2; }
    .tag-category.life { background: #7bb8c9; }
    .tag-category.study { background: #c9a67b; }

    .todo-item .text {
      flex: 1;
      font-size: 14px;
      color: var(--text-primary);
      word-break: break-word;
      cursor: pointer;
      transition: color 0.25s;
    }

    .todo-item .text.completed {
      text-decoration: line-through;
      color: var(--text-muted);
      text-decoration-color: rgba(212, 163, 115, 0.3);
    }

    .edit-input {
      flex: 1;
      padding: 6px 10px;
      border: 2px solid var(--gold);
      border-radius: var(--radius-sm);
      background: var(--bg-primary);
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--text-primary);
      outline: none;
    }

    .todo-item .icon-btn {
      background: none;
      border: none;
      font-family: var(--font-body);
      font-size: 13px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
      color: var(--text-muted);
    }

    .todo-item .icon-btn:hover {
      background: rgba(212, 163, 115, 0.1);
      color: var(--gold);
    }

    .todo-item .delete-btn {
      background: none;
      border: none;
      color: var(--danger);
      font-size: 18px;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
      transition: background 0.15s;
      flex-shrink: 0;
      line-height: 1;
    }

    .todo-item .delete-btn:hover {
      background: var(--danger-bg);
    }

    .empty-friendly {
      text-align: center;
      padding: 52px 16px 24px;
      color: var(--text-muted);
    }

    .empty-friendly .title {
      font-family: var(--font-heading);
      font-size: 17px;
      font-weight: 500;
      color: var(--gold-dark);
      margin-bottom: 8px;
    }

    .empty-friendly .sub {
      font-size: 13px;
      color: var(--text-muted);
    }

    @media (max-width: 480px) {
      body {
        padding: 24px 12px;
      }

      .card {
        padding: 24px 16px;
      }

      h1 {
        font-size: 24px;
      }

      .input-row {
        flex-wrap: wrap;
        gap: 6px;
      }

      .input-row input {
        font-size: 14px;
        padding: 10px 14px;
        min-width: 100%;
        order: -1;
      }

      .custom-select {
        flex: 1;
      }

      .select-trigger {
        font-size: 12px;
        padding: 10px 8px;
      }

      .input-row .add-btn {
        padding: 10px 16px;
        font-size: 13px;
        flex: 1;
      }

      .stats {
        flex-direction: column;
        gap: 8px;
        align-items: flex-start;
      }

      .filter-row {
        gap: 4px;
      }

      .filter-btn {
        font-size: 11px;
        padding: 4px 10px;
      }

      .todo-item {
        padding: 10px 12px;
      }

      .todo-item .text {
        font-size: 13px;
      }

      .tag-priority, .tag-category {
        font-size: 9px;
        padding: 1px 5px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>我的待办</h1>

      <div class="input-row">
        <input type="text" id="todoInput" placeholder="输入待办事项..." autofocus>
        <div class="custom-select" id="prioritySelect">
          <button class="select-trigger" type="button">
            <span class="select-value">中</span>
            <span class="select-arrow">&#9662;</span>
          </button>
          <div class="select-dropdown"></div>
        </div>
        <div class="custom-select" id="categorySelect">
          <button class="select-trigger" type="button">
            <span class="select-value">通用</span>
            <span class="select-arrow">&#9662;</span>
          </button>
          <div class="select-dropdown"></div>
        </div>
        <button class="add-btn" id="addBtn">添加</button>
      </div>

      <div class="stats">
        <div class="counts">
          未完成: <span id="incompleteCount">0</span> &nbsp;|&nbsp; 总计: <span id="totalCount">0</span>
        </div>
        <button class="clear-all-btn hidden" id="clearAllBtn">全部清空</button>
      </div>

      <div class="filters">
        <div class="filter-row">
          <button class="filter-btn" data-filter="all">全部</button>
          <button class="filter-btn" data-filter="incomplete">未完成</button>
          <button class="filter-btn" data-filter="completed">已完成</button>
        </div>
        <div class="filter-row">
          <button class="filter-btn priority-btn" data-priority="all">全部</button>
          <button class="filter-btn priority-btn" data-priority="high">高</button>
          <button class="filter-btn priority-btn" data-priority="medium">中</button>
          <button class="filter-btn priority-btn" data-priority="low">低</button>
        </div>
        <div class="filter-row">
          <button class="filter-btn category-btn" data-category="all">全部</button>
          <button class="filter-btn category-btn" data-category="general">通用</button>
          <button class="filter-btn category-btn" data-category="work">工作</button>
          <button class="filter-btn category-btn" data-category="life">生活</button>
          <button class="filter-btn category-btn" data-category="study">学习</button>
        </div>
      </div>

      <ul class="todo-list" id="todoList"></ul>

      <div class="empty-friendly" id="emptyMsg">
        <div class="title" id="emptyTitle">还没有待办事项</div>
        <div class="sub" id="emptySub">在上方输入内容，开始管理你的任务吧</div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'todos';

    let todos = loadTodos();
    let editingId = null;
    let activeFilter = 'all';
    let activeCategory = 'all';
    let activePriority = 'all';

    const todoInput = document.getElementById('todoInput');
    const prioritySelectEl = document.getElementById('prioritySelect');
    const categorySelectEl = document.getElementById('categorySelect');
    const addBtn = document.getElementById('addBtn');
    const todoList = document.getElementById('todoList');
    const emptyMsg = document.getElementById('emptyMsg');
    const emptyTitle = document.getElementById('emptyTitle');
    const emptySub = document.getElementById('emptySub');
    const incompleteCount = document.getElementById('incompleteCount');
    const totalCount = document.getElementById('totalCount');
    const clearAllBtn = document.getElementById('clearAllBtn');

    const tagMap = { high: '高', medium: '中', low: '低' };
    const catMap = { general: '通用', work: '工作', life: '生活', study: '学习' };

    function createCustomSelect(container, options, defaultVal) {
      let currentVal = defaultVal;
      const trigger = container.querySelector('.select-trigger');
      const valueEl = container.querySelector('.select-value');
      const dropdown = container.querySelector('.select-dropdown');

      dropdown.innerHTML = options.map(o =>
        `<button class="select-option${o.value === defaultVal ? ' selected' : ''}" data-value="${o.value}">${o.label}</button>`
      ).join('');

      trigger.addEventListener('click', e => {
        e.stopPropagation();
        if (container.classList.contains('open')) {
          container.classList.remove('open');
          dropdown.style.display = 'none';
        } else {
          closeAllDropdowns();
          container.classList.add('open');
          dropdown.style.display = 'block';
        }
      });

      dropdown.addEventListener('click', e => e.stopPropagation());

      dropdown.querySelectorAll('.select-option').forEach(btn => {
        btn.addEventListener('click', () => {
          currentVal = btn.dataset.value;
          valueEl.textContent = btn.textContent;
          dropdown.querySelectorAll('.select-option').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          container.classList.remove('open');
          dropdown.style.display = 'none';
        });
      });

      return {
        getValue: () => currentVal,
        setValue: val => {
          currentVal = val;
          const opt = dropdown.querySelector(`.select-option[data-value="${val}"]`);
          if (opt) {
            valueEl.textContent = opt.textContent;
            dropdown.querySelectorAll('.select-option').forEach(b => b.classList.remove('selected'));
            opt.classList.add('selected');
          }
        }
      };
    }

    function closeAllDropdowns() {
      document.querySelectorAll('.custom-select.open').forEach(el => {
        el.classList.remove('open');
        el.querySelector('.select-dropdown').style.display = 'none';
      });
    }

    document.addEventListener('click', closeAllDropdowns);

    const prioritySelect = createCustomSelect(prioritySelectEl, [
      { value: 'low', label: '低' },
      { value: 'medium', label: '中' },
      { value: 'high', label: '高' }
    ], 'medium');

    const categorySelect = createCustomSelect(categorySelectEl, [
      { value: 'general', label: '通用' },
      { value: 'work', label: '工作' },
      { value: 'life', label: '生活' },
      { value: 'study', label: '学习' }
    ], 'general');

    function loadTodos() {
      try {
        const data = localStorage.getItem(STORAGE_KEY);
        return data ? JSON.parse(data) : [];
      } catch {
        return [];
      }
    }

    function saveTodos() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
    }

    function addTask() {
      const text = todoInput.value.trim();
      if (!text) return;

      todos.push({
        id: Date.now(),
        text,
        completed: false,
        priority: prioritySelect.getValue(),
        category: categorySelect.getValue()
      });

      todoInput.value = '';
      todoInput.focus();
      prioritySelect.setValue('medium');
      categorySelect.setValue('general');
      activeFilter = 'all';
      activeCategory = 'all';
      activePriority = 'all';
      saveTodos();
      render();
    }

    function toggleTask(id) {
      const todo = todos.find(t => t.id === id);
      if (todo) {
        todo.completed = !todo.completed;
        saveTodos();
        render();
      }
    }

    function deleteTask(id) {
      const li = document.querySelector(`.todo-item[data-id="${id}"]`);
      if (li) {
        li.classList.add('removing');
        setTimeout(() => {
          todos = todos.filter(t => t.id !== id);
          saveTodos();
          if (editingId === id) editingId = null;
          render();
        }, 250);
      }
    }

    function editTask(id) {
      editingId = id;
      render();
      const input = document.querySelector(`.edit-input[data-id="${id}"]`);
      if (input) {
        input.focus();
        input.select();
      }
    }

    function saveEdit(id) {
      const input = document.querySelector(`.edit-input[data-id="${id}"]`);
      if (!input) return;

      const text = input.value.trim();
      if (!text) {
        editingId = null;
        render();
        return;
      }

      const todo = todos.find(t => t.id === id);
      if (todo) {
        todo.text = text;
        saveTodos();
      }
      editingId = null;
      render();
    }

    function cancelEdit(id) {
      editingId = null;
      render();
    }

    function clearAll() {
      if (todos.length === 0) return;
      if (confirm('确定要清空所有待办事项吗？')) {
        todos = [];
        editingId = null;
        activeFilter = 'all';
        activeCategory = 'all';
        activePriority = 'all';
        saveTodos();
        render();
      }
    }

    function setFilter(filter) {
      activeFilter = filter;
      render();
    }

    function setCategory(category) {
      activeCategory = category;
      render();
    }

    function setPriority(priority) {
      activePriority = priority;
      render();
    }

    function render() {
      const incomplete = todos.filter(t => !t.completed).length;
      const total = todos.length;

      incompleteCount.textContent = incomplete;
      totalCount.textContent = total;
      clearAllBtn.classList.toggle('hidden', total === 0);

      document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === activeFilter);
      });
      document.querySelectorAll('.filter-btn[data-category]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.category === activeCategory);
      });
      document.querySelectorAll('.filter-btn[data-priority]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.priority === activePriority);
      });

      let filtered = todos;
      if (activeFilter === 'incomplete') filtered = filtered.filter(t => !t.completed);
      if (activeFilter === 'completed') filtered = filtered.filter(t => t.completed);
      if (activeCategory !== 'all') filtered = filtered.filter(t => t.category === activeCategory);
      if (activePriority !== 'all') filtered = filtered.filter(t => t.priority === activePriority);

      if (filtered.length === 0) {
        todoList.innerHTML = '';
        if (total === 0) {
          emptyTitle.textContent = '还没有待办事项';
          emptySub.textContent = '在上方输入内容，开始管理你的任务吧';
        } else {
          emptyTitle.textContent = '没有符合条件的待办事项';
          emptySub.textContent = '试试切换其他筛选条件';
        }
        emptyMsg.style.display = 'block';
        return;
      }

      emptyMsg.style.display = 'none';

      todoList.innerHTML = filtered.map((t, idx) => {
        const isEditing = editingId === t.id;
        const tag = tagMap[t.priority] || '中';
        const cat = catMap[t.category] || '通用';

        if (isEditing) {
          return `
            <li class="todo-item" data-id="${t.id}" style="animation-delay: ${idx * 0.04}s">
              <input type="checkbox" ${t.completed ? 'checked' : ''}>
              <span class="tag-priority ${t.priority}">${tag}</span>
              <span class="tag-category ${t.category}">${cat}</span>
              <input class="edit-input" data-id="${t.id}" value="${escapeHtml(t.text)}">
              <button class="icon-btn save-btn" data-id="${t.id}">保存</button>
            </li>
          `;
        }

        return `
          <li class="todo-item" data-id="${t.id}" style="animation-delay: ${idx * 0.04}s">
            <input type="checkbox" ${t.completed ? 'checked' : ''}>
            <span class="tag-priority ${t.priority}">${tag}</span>
            <span class="tag-category ${t.category}">${cat}</span>
            <span class="text ${t.completed ? 'completed' : ''}">${escapeHtml(t.text)}</span>
            <button class="icon-btn edit-btn" data-id="${t.id}">编辑</button>
            <button class="delete-btn" data-id="${t.id}">&times;</button>
          </li>
        `;
      }).join('');

      todoList.querySelectorAll('.todo-item').forEach(li => {
        const id = Number(li.dataset.id);
        const cb = li.querySelector('input[type="checkbox"]');

        if (editingId === id) {
          const saveBtn = li.querySelector('.save-btn');
          const editInput = li.querySelector('.edit-input');

          if (editInput) {
            editInput.addEventListener('keydown', e => {
              if (e.key === 'Enter') saveEdit(id);
              if (e.key === 'Escape') cancelEdit(id);
            });
            editInput.addEventListener('blur', () => saveEdit(id));
          }
          if (saveBtn) {
            saveBtn.addEventListener('click', () => saveEdit(id));
          }
        } else {
          const editBtn = li.querySelector('.edit-btn');
          const delBtn = li.querySelector('.delete-btn');

          cb.addEventListener('change', () => toggleTask(id));
          if (editBtn) editBtn.addEventListener('click', () => editTask(id));
          if (delBtn) delBtn.addEventListener('click', () => deleteTask(id));
        }
      });
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    addBtn.addEventListener('click', addTask);
    todoInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });
    clearAllBtn.addEventListener('click', clearAll);

    document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
      btn.addEventListener('click', () => setFilter(btn.dataset.filter));
    });
    document.querySelectorAll('.filter-btn[data-category]').forEach(btn => {
      btn.addEventListener('click', () => setCategory(btn.dataset.category));
    });
    document.querySelectorAll('.filter-btn[data-priority]').forEach(btn => {
      btn.addEventListener('click', () => setPriority(btn.dataset.priority));
    });

    document.querySelector('.filter-btn[data-filter="all"]').classList.add('active');
    document.querySelector('.filter-btn[data-category="all"]').classList.add('active');
    document.querySelector('.filter-btn[data-priority="all"]').classList.add('active');

    render();
  </script>
</body>
</html>
